name: Build Pico 2 W UAC1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placa-alvo (pode trocar para pico_2w se quiser explicitar)
      PICO_BOARD: pico_w
      # Faz o CMake baixar automaticamente o pico-sdk se não existir
      PICO_SDK_FETCH_FROM_GIT: 1

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Dependências de compilação do RP2040
      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi libnewlib-arm-none-eabi \
                              cmake ninja-build build-essential

      - name: Configurar (SBC only)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_BOARD=$PICO_BOARD \
            -DPICO_SDK_FETCH_FROM_GIT=$PICO_SDK_FETCH_FROM_GIT \
            -DBT_A2DP_CODEC=SBC \
            -DENABLE_LDAC=OFF \
            -DENABLE_FDK_AAC=OFF \
            -DENABLE_SAC=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Compilar firmware
        run: |
          cd build
          cmake --build . --parallel
      - name: Publicar UF2
        uses: actions/upload-artifact@v4
        with:
          name: pico2w-uac1-uf2
          path: build/**/*.uf2
          if-no-files-found: error
