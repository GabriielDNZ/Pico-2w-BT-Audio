name: Build Pico 2 W UAC1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi libnewlib-arm-none-eabi cmake ninja-build python3-pip build-essential

      - name: Compilar firmware UAC1
        run: |
          mkdir -p build
          cd build
          cmake .. -DPICO_BOARD=pico_w -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel

      - name: Publicar .uf2
        uses: actions/upload-artifact@v4
        with:
          name: pico2w-uac1-uf2
          path: build/**/*.uf2
          if-no-files-found: error
