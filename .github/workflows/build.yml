name: Build Pico UF2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            ninja-build \
            python3

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version
          arm-none-eabi-g++ --version

      - name: Fetch Pico SDK
        run: |
          git clone --branch 2.1.1 --depth 1 https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"
          git -C "$PICO_SDK_PATH" submodule update --init --recursive

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPICO_BOARD=pico2_w -DPICO_SDK_PATH="$PICO_SDK_PATH"

      - name: Build
        run: cmake --build build

      - name: Show output sizes
        run: |
          ls -lh build/*.uf2 build/*.bin build/*.elf build/*.hex

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: PicoW_USB_BT_Audio-ps5-tinyusb-audio10
          path: |
            build/*.uf2
            build/*.bin
            build/*.elf
            build/*.hex
            build/compile_commands.json
          if-no-files-found: error
